<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMC Terminal</title>
<style>
  :root {
    --bg: #0b0e11;
    --panel: #12161b;
    --line: #1f262e;
    --text: #d7dde3;
    --muted: #7c8a97;
    --amber: #e8a33d;
    --green: #3ddc84;
    --red: #e8503d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .mono { font-family: "SF Mono", "Consolas", "Menlo", monospace; }

  #login-screen {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #login-screen h1 { font-size: 1.1rem; color: var(--amber); letter-spacing: 0.08em; text-transform: uppercase; }
  #login-screen input {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 1rem;
    width: 260px;
  }
  #login-screen button, .action-btn {
    background: var(--amber);
    color: #1a1200;
    border: none;
    padding: 12px 20px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
  }
  #login-error { color: var(--red); font-size: 0.85rem; min-height: 1em; }

  #app { display: none; max-width: 640px; margin: 0 auto; padding: 20px 16px 60px; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 20px;
  }
  header h1 { font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--amber); margin: 0; }
  .pulse-wrap { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: var(--muted); }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .card h2 { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 0 0 12px; }

  .stat-row { display: flex; justify-content: space-between; }
  .stat { text-align: left; }
  .stat .value { font-size: 1.4rem; font-weight: 600; }
  .stat .label { font-size: 0.7rem; color: var(--muted); }

  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; color: var(--muted); font-weight: 500; font-size: 0.7rem; text-transform: uppercase; padding-bottom: 8px; }
  td { padding: 8px 0; border-top: 1px solid var(--line); }
  .side-buy { color: var(--green); }
  .side-sell { color: var(--red); }

  .empty { color: var(--muted); font-size: 0.85rem; padding: 8px 0; }

  .manual-form { display: flex; gap: 8px; flex-wrap: wrap; }
  .manual-form select, .manual-form input {
    background: #0b0e11;
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px;
    border-radius: 6px;
    font-size: 0.85rem;
    flex: 1;
    min-width: 90px;
  }

  .activity-item { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 8px 0; border-top: 1px solid var(--line); }
  .activity-item:first-child { border-top: none; }
  .status-ok { color: var(--green); }
  .status-error, .status-blocked { color: var(--red); }
</style>
</head>
<body>

<div id="login-screen">
  <h1>SMC Terminal</h1>
  <input type="password" id="password-input" placeholder="Dashboard password" autocomplete="off">
  <button onclick="login()">Enter</button>
  <div id="login-error"></div>
</div>

<div id="app">
  <header>
    <h1>SMC Terminal</h1>
    <div class="pulse-wrap"><span class="pulse"></span><span id="mode-label">—</span></div>
  </header>

  <div class="card">
    <h2>Account</h2>
    <div class="stat-row">
      <div class="stat"><div class="value" id="equity-val">—</div><div class="label">Equity (USDT)</div></div>
      <div class="stat"><div class="value" id="positions-val">—</div><div class="label">Open Positions</div></div>
      <div class="stat"><div class="value" id="lock-val">—</div><div class="label">Daily Loss Lock</div></div>
    </div>
  </div>

  <div class="card">
    <h2>Open Positions</h2>
    <div id="positions-container"><div class="empty">No open positions.</div></div>
  </div>

  <div class="card">
    <h2>Manual Trade</h2>
    <div class="manual-form">
      <input id="manual-symbol" placeholder="BTCUSDT" value="BTCUSDT">
      <select id="manual-action"><option value="buy">Buy</option><option value="sell">Sell</option></select>
      <button class="action-btn" onclick="manualTrade()">Execute</button>
    </div>
  </div>

  <div class="card">
    <h2>Recent Activity</h2>
    <div id="activity-container"><div class="empty">No signals yet.</div></div>
  </div>
</div>

<script>
  // Points at the live Railway backend
  const API_BASE = "https://web-production-66509.up.railway.app";

  let dashboardPassword = "";

  async function login() {
    dashboardPassword = document.getElementById("password-input").value;
    const res = await apiCall("/api/status");
    if (res && res.equity !== undefined) {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("app").style.display = "block";
      refreshAll();
      setInterval(refreshAll, 8000);
    } else {
      document.getElementById("login-error").textContent = "Incorrect password or server unreachable.";
    }
  }

  async function apiCall(path, extra = {}) {
    try {
      const res = await fetch(API_BASE + path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: dashboardPassword, ...extra }),
      });
      return await res.json();
    } catch (e) {
      console.error(e);
      return null;
    }
  }

  async function refreshAll() {
    const status = await apiCall("/api/status");
    if (status) {
      document.getElementById("equity-val").textContent = status.equity ? status.equity.toFixed(2) : "—";
      document.getElementById("positions-val").textContent = status.open_positions ?? "—";
      document.getElementById("lock-val").textContent = status.daily_loss_locked ? "LOCKED" : "OK";
      document.getElementById("mode-label").textContent = "Live";
    }

    const posData = await apiCall("/api/positions");
    const posContainer = document.getElementById("positions-container");
    if (posData && posData.positions && posData.positions.length) {
      let html = "<table><tr><th>Symbol</th><th>Side</th><th>Size</th><th>Entry</th><th>PnL</th></tr>";
      posData.positions.forEach(p => {
        const sideClass = p.side === "Buy" ? "side-buy" : "side-sell";
        html += `<tr><td>${p.symbol}</td><td class="${sideClass}">${p.side}</td><td>${p.size}</td><td>${p.entry_price}</td><td>${p.unrealized_pnl}</td></tr>`;
      });
      html += "</table>";
      posContainer.innerHTML = html;
    } else {
      posContainer.innerHTML = '<div class="empty">No open positions.</div>';
    }

    const activityData = await apiCall("/api/activity");
    const activityContainer = document.getElementById("activity-container");
    if (activityData && activityData.activity && activityData.activity.length) {
      let html = "";
      activityData.activity.forEach(a => {
        const statusClass = "status-" + (a.result?.status || "error");
        html += `<div class="activity-item"><span>${a.time} · ${a.source} · ${a.symbol} ${a.action}</span><span class="${statusClass}">${a.result?.status || ""}</span></div>`;
      });
      activityContainer.innerHTML = html;
    } else {
      activityContainer.innerHTML = '<div class="empty">No signals yet.</div>';
    }
  }

  async function manualTrade() {
    const symbol = document.getElementById("manual-symbol").value.trim().toUpperCase();
    const action = document.getElementById("manual-action").value;
    const result = await apiCall("/api/manual_trade", { symbol, action });
    alert(result ? JSON.stringify(result, null, 2) : "Request failed.");
    refreshAll();
  }

  document.getElementById("password-input").addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });
</script>

</body>
</html>
